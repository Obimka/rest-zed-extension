name = "HTTP"
grammar = "http"
path_suffixes = ["http", "rest"]
line_comments = ["# ", "// "]
tab_size = 2
hard_tabs = false
first_line_pattern = "^(OPTIONS|GET|HEAD|POST|PUT|DELETE|TRACE|CONNECT|PATCH|LIST|GRAPHQL|WEBSOCKET)\\s+"

brackets = [
  { start = "{", end = "}", close = true, newline = true, not_in = ["string"] },
  { start = "[", end = "]", close = true, newline = true, not_in = ["string"] },
  { start = "<", end = ">", close = false, newline = false, not_in = ["string"] },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
]
